<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Draw | Smeargle Says</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="canvas-page">
  <div class="topbar">
    <h1 id="roundNumber">Round 1</h1>

    <h2 id="pokemonName" class="top-pokemon-name">Loading...</h2>

    <div class="top-right-actions">
      <button id="doneBtn">Done</button>
      <button id="giveUpBtn">Give up?</button>
      <div class="timer">120</div>
    </div>
  </div>

  <div class="game">
    <div class="toolbar">
      <button id="brushBtn">Brush</button>
      <button id="eraserBtn">Eraser</button>
      <button id="fillBtn">Fill</button>

      <label>Size</label>
      <input type="range" id="size" min="1" max="30" value="5">

      <label>Opacity</label>
      <input type="range" id="opacity" min="0.1" max="1" step="0.1" value="1">

      <label>Color</label>
      <input type="color" id="color" value="#000000">

      <button id="clearBtn">Clear</button>
    </div>

    <div class="canvas-container">
      <canvas id="canvas" width="700" height="500"></canvas>
    </div>

    <div class="reference">
      <h3>Reference</h3>
      <img id="pokemonImage" alt="Pokemon Reference">
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
