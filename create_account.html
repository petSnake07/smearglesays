<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account | Smeargle Says</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="center-page login-page create-account-page">
  <a class="back-arrow auth-back-arrow" href="login.html">&lt;</a>
  <main class="login-card compact-card">
    <form id="createAccountForm" class="login-form">
      <p id="createError" class="form-error"></p>

      <label for="newUsername">Username</label>
      <input id="newUsername" type="text" autocomplete="username" required>

      <label for="newEmail">Email</label>
      <input id="newEmail" type="email" autocomplete="email" required>

      <label for="newPassword">Password</label>
      <input id="newPassword" type="password" autocomplete="new-password" required>

      <label for="confirmPassword">Confirm password</label>
      <input id="confirmPassword" type="password" autocomplete="new-password" required>

      <label class="captcha-row">
        <input type="checkbox" id="captchaCheck">
        <span>I'm not a bot</span>
      </label>

      <button class="big-button login-button" type="submit">CREATE</button>
    </form>
  </main>
  <script src="script.js"></script>
</body>
</html>
