<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Smeargle Says</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="center-page login-page">
  <main class="login-card">
    <a class="guest-button" href="canvas.html?guest=1">PLAY AS GUEST</a>
    <p class="or-text">OR</p>

    <form id="loginForm" class="login-form">
      <p id="loginError" class="form-error"></p>
      <label for="username">Username</label>
      <input id="username" type="text" autocomplete="username">

      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password">

      <label class="remember-row">
        <span>Remember me</span>
        <input type="checkbox" id="rememberMe">
      </label>

      <button class="big-button login-button" type="submit">LOG IN</button>
    </form>

    <p class="create-text">don't have an account?<br><a href="create_account.html">Create one.</a></p>
  </main>
  <script src="script.js"></script>
</body>
</html>
