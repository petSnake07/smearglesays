<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smeargle Says</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="center-page home-page">
  <main class="home-card">
    <img src="logo.png" alt="Smeargle Says" class="logo">
    <p class="tagline">The Pokémon drawing app<br>Gotta sketch 'em all!</p>
    <a class="big-button play-button" href="login.html">PLAY!</a>

    <aside class="daily-card daily-home-card" aria-live="polite">
      <span class="daily-kicker">Daily Challenge</span>
      <img id="dailyHomeImage" class="daily-image" alt="Today's daily Pokémon">
      <strong id="dailyHomeName">Loading...</strong>
      <button id="dailyHomeBtn" class="small-button daily-play-button" type="button">PLAY</button>
    </aside>
  </main>
  <script src="script.js"></script>
</body>
</html>
